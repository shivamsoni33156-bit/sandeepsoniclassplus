<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity - Teaching Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Gravity</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#" onclick="showLogin()">Login</a>
                <a class="nav-link" href="#" onclick="showRegister()">Register</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-lg-6">
                <h1 class="display-4 fw-bold text-primary">Professional Teaching Platform</h1>
                <p class="lead">Manage courses, students, tests & payments like Classplus.</p>
                <div class="mt-4">
                    <button class="btn btn-primary btn-lg me-3" onclick="showRegister('teacher')">Teacher Signup</button>
                    <button class="btn btn-outline-primary btn-lg" onclick="showRegister('student')">Student Signup</button>
                </div>
            </div>
            <div class="col-lg-6">
                <img src="https://via.placeholder.com/500x300/007bff/ffffff?text=Classplus+Style" class="img-fluid rounded shadow" alt="Platform">
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Login</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" id="loginUser" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="loginPass" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal fade" id="registerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="regTitle">Register</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="registerForm">
                        <input type="hidden" id="regRole" value="student">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" id="regUser" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="regEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="regPhone">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="regPass" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Register</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/app.js"></script>
    <script>
        function showLogin() { new bootstrap.Modal(document.getElementById('loginModal')).show(); }
        function showRegister(role = 'student') {
            document.getElementById('regRole').value = role;
            document.getElementById('regTitle').textContent = role.charAt(0).toUpperCase() + role.slice(1) + ' Register';
            new bootstrap.Modal(document.getElementById('registerModal')).show();
        }
    </script>
</body>
</html>
